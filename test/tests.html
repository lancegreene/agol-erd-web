<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>agol-erd-web parity tests</title>
<style>body{font-family:monospace;background:#111;color:#ccc;padding:16px}
.pass{color:#5fb85f}.fail{color:#e06c6c;white-space:pre-wrap}</style></head>
<body>
<h2>Parity vectors (Python-generated) vs JS ports</h2>
<div id="out">loading…</div>
<script src="../js/parsers.js"></script>
<script src="../js/report.js"></script>
<script>
window.__results = {pass: 0, fail: 0, failures: []};
const out = document.getElementById("out");

// Canonical (key-sorted) compare: vectors.json is dumped with sort_keys=True,
// while JS objects carry insertion order — plain JSON.stringify equality
// would false-fail on every object.
function canon(x) {
  if (Array.isArray(x)) return "[" + x.map(canon).join(",") + "]";
  if (x !== null && typeof x === "object") {
    return "{" + Object.keys(x).sort().map(k => JSON.stringify(k) + ":" + canon(x[k])).join(",") + "}";
  }
  return JSON.stringify(x);
}
function deepEqual(a, b) { return canon(a) === canon(b); }

function check(category, i, actual, expected) {
  if (deepEqual(actual, expected)) {
    window.__results.pass++;
  } else {
    window.__results.fail++;
    const msg = category + "[" + i + "]\nexpected: " + JSON.stringify(expected) +
      "\nactual:   " + JSON.stringify(actual);
    window.__results.failures.push(msg);
    const div = document.createElement("div");
    div.className = "fail";
    div.textContent = "FAIL " + msg;
    out.appendChild(div);
  }
}

fetch("vectors.json").then(r => r.json()).then(v => {
  out.textContent = "";
  v.normalize_service_url.forEach((c, i) =>
    check("normalize_service_url", i, Parsers.normalizeServiceUrl(c.in), c.out));
  v.split_layer_index.forEach((c, i) =>
    check("split_layer_index", i, Parsers.splitLayerIndex(c.in), c.out));
  v.is_item_id.forEach((c, i) =>
    check("is_item_id", i, Parsers.isItemId(c.in), c.out));
  v.parse_webmap.forEach((c, i) => {
    const [refs, warnings] = Parsers.parseWebmap(c.in);
    check("parse_webmap", i, {refs, warnings}, c.out);
  });
  v.parse_exb.forEach((c, i) => {
    const [refs, warnings] = Parsers.parseExb(c.in);
    check("parse_exb", i, {refs, warnings}, c.out);
  });
  v.parse_exb_with_fallback.forEach((c, i) => {
    const [refs, warnings] = Parsers.parseExbWithFallback(c.in);
    check("parse_exb_with_fallback", i, {refs, warnings}, c.out);
  });
  v.parse_generic_app.forEach((c, i) => {
    const [refs, warnings] = Parsers.parseGenericApp(c.in);
    check("parse_generic_app", i, {refs, warnings}, c.out);
  });
  v.resolve_refs.forEach((c, i) => {
    const [edges, externals] = Parsers.resolveRefs(
      c.in.source_id, c.in.refs, new Set(c.in.group_ids), c.in.url_to_id);
    check("resolve_refs", i, {edges, externals}, c.out);
  });
  v.build_url_lookup.forEach((c, i) => {
    const [lookup, warnings] = Parsers.buildUrlLookup(c.in);
    check("build_url_lookup", i, {lookup, warnings}, c.out);
  });
  if (typeof Report !== "undefined") {
    v.external_domain.forEach((c, i) =>
      check("external_domain", i, Report.externalDomain(c.in), c.out));
    v.build_markdown.forEach((c, i) =>
      check("build_markdown", i, Report.buildMarkdown(c.in), c.out));
  } else {
    const div = document.createElement("div");
    div.textContent = "(report.js not present yet — skipping its categories)";
    out.appendChild(div);
  }
  const sum = document.createElement("div");
  sum.className = window.__results.fail ? "fail" : "pass";
  sum.textContent = "RESULT: " + window.__results.pass + " pass, " + window.__results.fail + " fail";
  out.prepend(sum);
});
</script>
</body>
</html>
